<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VSF AI Annotation Platform MVP</title>
  <style>
    :root {
      --bg: #f5f3ff;
      --surface: #ffffff;
      --surface-2: #eef2ff;
      --ink: #1e1b4b;
      --muted: #64748b;
      --line: #dbeafe;
      --primary: #6366f1;
      --primary-2: #06b6d4;
      --purple: #8b5cf6;
      --cta: #10b981;
      --good: #16a34a;
      --warn: #d97706;
      --bad: #dc2626;
      --info: #0369a1;
      --shadow: 0 18px 50px rgba(15, 23, 42, .08);
      --radius: 8px;
      --sidebar: 280px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 0%, rgba(99, 102, 241, .18), transparent 30rem),
        radial-gradient(circle at 88% 8%, rgba(6, 182, 212, .16), transparent 28rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 42%, #f0f9ff 100%);
      color: var(--ink);
    }

    button, input, textarea, select { font: inherit; }

    button, select, .nav-item, .task-row, .source-card, .tab, .step, .chip, .clickable {
      cursor: pointer;
    }

    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, .nav-item:focus-visible, .tab:focus-visible, .user-pill:focus-visible {
      outline: 3px solid rgba(79, 70, 229, .28);
      outline-offset: 2px;
    }

    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      background: linear-gradient(180deg, #ffffff 0%, #eef2ff 58%, #ecfeff 100%);
      color: var(--ink);
      border-right: 1px solid var(--line);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 8px 6px 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .brand strong { display: block; color: var(--ink); font-size: 14px; }
    .brand span { color: var(--muted); font-size: 12px; }

    .nav-section-title {
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: 11px;
      margin: 10px 8px 6px;
    }

    .nav-list {
      display: grid;
      gap: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px;
      color: #475569;
      background: transparent;
      text-align: left;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
      width: 100%;
    }

    .nav-item:hover { background: rgba(224, 242, 254, .72); color: #312e81; border-color: #bae6fd; }
    .nav-item.active { background: linear-gradient(135deg, rgba(99, 102, 241, .16), rgba(6, 182, 212, .14)); border-color: #a5b4fc; color: #312e81; }
    .nav-icon {
      width: 18px;
      height: 18px;
      color: currentColor;
      flex: 0 0 auto;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, .86);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .breadcrumb {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .page-title {
      margin: 4px 0 0;
      font-size: 23px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .account-menu {
      position: relative;
    }

    .user-pill {
      display: flex;
      align-items: center;
      gap: 9px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 999px;
      padding: 7px 11px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }

    .user-pill:hover {
      border-color: #a5b4fc;
      background: rgba(224, 242, 254, .72);
      color: #312e81;
    }

    .user-caret {
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    .account-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 20;
      min-width: 178px;
      display: none;
      gap: 4px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 16px 40px rgba(15, 23, 42, .14);
    }

    .account-dropdown.open {
      display: grid;
    }

    .account-dropdown button {
      width: 100%;
      justify-content: flex-start;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--primary-2), var(--purple));
      font-size: 12px;
      font-weight: 800;
    }

    .content {
      padding: 24px;
      min-width: 0;
    }

    .view { display: none; }
    .view.active { display: block; }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
    }

    .card.padded { padding: 16px; }
    .card-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-header h2, .card-header h3, .section-title {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .body-copy { font-size: 14px; line-height: 1.6; color: #334155; }

    .metric {
      padding: 16px;
      display: grid;
      gap: 10px;
      min-height: 118px;
    }

    .metric span { color: var(--muted); font-size: 13px; }
    .metric strong { font-size: 30px; line-height: 1; }
    .metric .trend { color: var(--info); font-size: 12px; }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      padding: 9px 13px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      transition: background .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
      text-decoration: none;
      font-weight: 650;
    }

    .btn:hover { border-color: #a5b4fc; background: #eef2ff; }
    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border-color: transparent;
      box-shadow: 0 10px 24px rgba(79, 70, 229, .18);
    }
    .btn.primary:hover { box-shadow: 0 14px 30px rgba(79, 70, 229, .24); }
    .btn.cta { background: var(--cta); border-color: var(--cta); color: white; }
    .btn.danger { background: #fee2e2; color: #991b1b; border-color: #fecaca; }
    .btn.ghost { background: transparent; }
    .btn:disabled, select:disabled { opacity: .55; cursor: not-allowed; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge.imported { background: #eef2ff; color: #4338ca; border-color: #c7d2fe; }
    .badge.running { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; }
    .badge.ready { background: #ecfdf5; color: #047857; border-color: #bbf7d0; }
    .badge.work { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .badge.submitted { background: #f5f3ff; color: #6d28d9; border-color: #ddd6fe; }
    .badge.returned { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .badge.approved { background: #ecfdf5; color: #15803d; border-color: #bbf7d0; }
    .badge.exported { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .badge.neutral { background: #f8faff; color: #475569; border-color: #c7d2fe; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: #475569;
      font-weight: 750;
      background: #f8faff;
    }

    tr:hover td { background: #fbfdff; }

    .table-wrap { overflow: auto; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field { display: grid; gap: 7px; }
    .field.full { grid-column: 1 / -1; }
    .field label {
      color: #334155;
      font-size: 13px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 10px 11px;
      min-height: 40px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    input[type="number"] { min-width: 86px; }

    .stepper {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .step {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: white;
      transition: border-color .18s ease, background .18s ease;
    }

    .step.active { border-color: var(--primary); background: #eef2ff; }
    .step.done { border-color: #bbf7d0; background: #f0fdf4; }
    .step span { display: block; font-size: 11px; color: var(--muted); }
    .step strong { font-size: 13px; }

    .upload-zone {
      border: 1.5px dashed #a5b4fc;
      background: #f8faff;
      border-radius: var(--radius);
      min-height: 150px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 18px;
      transition: background .18s ease, border-color .18s ease;
    }
    .upload-zone:hover { background: #eef2ff; border-color: var(--primary); }

    .error-panel {
      display: grid;
      gap: 8px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 13px;
    }

    .success-panel {
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      color: #166534;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 13px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(260px, .85fr) minmax(420px, 1.35fr) minmax(280px, .95fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      min-height: 680px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-body {
      padding: 16px;
      overflow: auto;
      min-height: 0;
      flex: 1;
    }

    .answer-box {
      max-height: 500px;
      overflow: auto;
      line-height: 1.75;
      color: #334155;
      font-size: 14px;
    }

    mark {
      background: #fef3c7;
      color: #78350f;
      padding: 2px 3px;
      border-radius: 4px;
    }

    .claim-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 13px;
      background: #fbfdff;
      display: grid;
      gap: 10px;
    }

    .score-table input {
      padding: 7px 8px;
      min-height: 34px;
      text-align: right;
    }

    .delta-high { color: var(--bad); font-weight: 800; }
    .delta-med { color: var(--warn); font-weight: 800; }
    .delta-low { color: var(--good); font-weight: 800; }

    .score-pill {
      display: inline-flex;
      min-width: 64px;
      justify-content: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 850;
      border: 1px solid transparent;
    }
    .score-good { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
    .score-warn { background: #fef3c7; color: #92400e; border-color: #fde68a; }
    .score-bad { background: #fee2e2; color: #991b1b; border-color: #fecaca; }

    .source-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
      background: #fff;
      transition: border-color .18s ease, background .18s ease;
    }
    .source-card:hover { border-color: #a5b4fc; background: #fbfdff; }

    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding: 0 16px;
    }

    .tab {
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      padding: 12px 4px;
      color: var(--muted);
      font-weight: 750;
    }
    .tab.active { color: var(--primary); border-color: var(--primary); }

    .banner {
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.45;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .banner.red { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .banner.blue { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }

    .split-diff {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .diff-col {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
      overflow: hidden;
    }

    .diff-col h3 {
      margin: 0;
      padding: 12px;
      background: #f8faff;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .diff-col .inner { padding: 12px; }

    .timeline {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .timeline-item {
      border-left: 2px solid #c7d2fe;
      padding-left: 12px;
      display: grid;
      gap: 4px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(15, 23, 42, .42);
      display: none;
      place-items: center;
      padding: 24px;
    }
    .modal-backdrop.active { display: grid; }

    .modal {
      width: min(540px, 100%);
      background: white;
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-header {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .modal-body { padding: 16px; display: grid; gap: 13px; }
    .modal-footer { padding: 16px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }

    .toast-area {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 80;
      display: grid;
      gap: 10px;
    }

    .toast {
      min-width: 300px;
      max-width: 420px;
      border: 1px solid #c7d2fe;
      background: white;
      border-left: 4px solid var(--primary);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 12px 14px;
      animation: slideUp .18s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      transition: background .18s ease, border-color .18s ease;
    }
    .chip.active { border-color: var(--primary); background: #eef2ff; color: #3730a3; }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .auth-wrap {
      min-height: calc(100vh - 150px);
      display: grid;
      place-items: center;
      padding: 24px 0;
    }

    .auth-card {
      width: min(520px, 100%);
      border: 1px solid rgba(199, 210, 254, .92);
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(14px);
      border-radius: 12px;
      box-shadow: 0 24px 70px rgba(99, 102, 241, .16);
      padding: 24px;
    }

    .auth-card h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }

    .auth-subtitle {
      margin: 8px 0 20px;
      color: var(--muted);
      line-height: 1.55;
    }

    .password-rules {
      display: grid;
      gap: 7px;
      padding: 12px;
      border-radius: var(--radius);
      background: #f8faff;
      border: 1px solid #c7d2fe;
      color: #475569;
      font-size: 13px;
    }

    .hidden { display: none !important; }

    @media (max-width: 1180px) {
      .app-shell { grid-template-columns: 86px minmax(0, 1fr); }
      .sidebar { padding: 18px 10px; }
      .brand div:not(.brand-mark), .nav-item span.label { display: none; }
      .brand { justify-content: center; padding-left: 0; padding-right: 0; }
      .workspace { grid-template-columns: 1fr; }
      .panel { min-height: auto; }
    }

    @media (max-width: 860px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .content { padding: 16px; }
      .grid-2, .grid-3, .grid-4, .form-grid, .split-diff { grid-template-columns: 1fr; }
      .stepper { grid-template-columns: 1fr; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        height: auto;
        display: block;
      }
      .nav-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .brand div:not(.brand-mark), .nav-item span.label { display: inline; }
      .brand { justify-content: flex-start; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">VSF</div>
        <div>
          <strong>AI Annotation</strong>
          <span>Vivipedia MVP</span>
        </div>
      </div>

      <div class="nav-section-title">Điều hướng</div>
      <nav id="navList" class="nav-list" aria-label="Điều hướng chính"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div id="breadcrumb" class="breadcrumb">Dashboard</div>
          <h1 id="pageTitle" class="page-title">Dashboard</h1>
        </div>
        <div class="top-actions">
          <div class="account-menu">
            <button class="user-pill" id="userMenuButton" type="button" aria-haspopup="menu" aria-expanded="false">
              <span class="avatar" id="avatarText">AD</span>
              <span id="userText">Admin Program Manager</span>
              <span class="user-caret" aria-hidden="true">▼</span>
            </button>
            <div class="account-dropdown" id="userMenu" role="menu">
              <button class="btn ghost" type="button" role="menuitem" data-account-action="change-password">Đổi mật khẩu</button>
              <button class="btn ghost" type="button" role="menuitem" data-account-action="logout">Đăng xuất</button>
            </div>
          </div>
        </div>
      </header>

      <section class="content">
        <div id="login" class="view"></div>
        <div id="changePassword" class="view"></div>
        <div id="dashboard" class="view active"></div>
        <div id="projects" class="view"></div>
        <div id="tasks" class="view"></div>
        <div id="annotation" class="view"></div>
        <div id="qa" class="view"></div>
        <div id="qaReview" class="view"></div>
        <div id="export" class="view"></div>
        <div id="users" class="view"></div>
        <div id="audit" class="view"></div>
      </section>
    </main>
  </div>

  <div id="returnModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="returnTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 id="returnTitle" class="section-title">Return task cho Annotator</h2>

    function validationBox() {

        </div>

          <section class="card panel">
            <div class="card-header"><h2>Answer Context</h2><span class="badge neutral">${t.domain}</span></div>

                <div class="card padded"><span class="muted small">Rule</span><div class="body-copy">Nếu lệch pre-score quá ±0.20, bắt buộc nhập lý do thay đổi.</div></div>
              </div>
              <div class="field" style="margin-top:14px;"><label>Lý do thay đổi</label><textarea id="reasonText" placeholder="Bắt buộc nếu delta vượt ±0.20">${escapeHtml(t.reason)}</textarea></div>

            <div class="panel-body">
              ${t.urls.map(url => `<div class="source-card"><strong>${escapeHtml(url)}</strong><span class="badge neutral">${t.domain}</span><div class="top-actions" style="justify-content:flex-start;"><button class="btn">Open in app</button><button class="btn">Open new tab</button></div></div>`).join("")}

              <div class="field"><label>Source note</label><textarea id="sourceNote" placeholder="Bắt buộc nếu không truy cập được">${escapeHtml(t.sourceNote)}</textarea></div>

            </div>
          </section>

    function highlightClaim(answer, claim) {
      const safeAnswer = escapeHtml(answer);
      const firstPart = escapeHtml(claim.split(" ").slice(0, 6).join(" "));
      return safeAnswer.replace(firstPart, `<mark>${firstPart}</mark>`);
    }

    function scoreTable(t) {
      return `<div class="table-wrap"><table class="score-table">
        <thead><tr><th>Dimension</th><th>Pre-score</th><th>Annotator input</th><th>Delta</th></tr></thead>
        <tbody>${dimensions.map(d => {
          const delta = Number(t.ann[d] - t.pre[d]);
          return `<tr><td><strong>${d}</strong></td><td>${fmtScore(t.pre[d])}</td><td><input type="number" min="0" max="1" step="0.01" value="${fmtScore(t.ann[d])}" data-score="${d}"></td><td id="delta-${d}" class="${deltaClass(delta)}">${delta >= 0 ? "+" : ""}${fmtScore(delta)}</td></tr>`;
        }).join("")}</tbody>
      </table></div>`;
    }

    function deltaClass(delta) {
      const abs = Math.abs(Number(delta));
      if (abs > .20) return "delta-high";
      if (abs > .10) return "delta-med";
      return "delta-low";
    }

    function tabLabel(tab) {
      return { rubric: "Rubric", guideline: "Guideline", examples: "Examples" }[tab];
    }
    function referenceContent() {
      if (state.activeReferenceTab === "rubric") return "SF: trung thành nguồn. SC: độ bao phủ nguồn. HR: xác nhận được/ít hallucination. SQ: chất lượng nguồn. REL: liên quan. COMP: đầy đủ. Điểm 0.80 trở lên là tốt, 0.60-0.79 cần cân nhắc, dưới 0.60 là rủi ro.";
      if (state.activeReferenceTab === "guideline") return "Giữ claim gần với nội dung nguồn. Không tăng độ mạnh của khẳng định nếu nguồn chỉ hỗ trợ một phần. Với nguồn không truy cập được, cần ghi note rõ.";
      return "Ví dụ tốt: claim có nguồn trực tiếp và điểm SC cao. Ví dụ cần return: claim dùng cụm từ tuyệt đối nhưng nguồn chỉ nêu thông tin gián tiếp.";
    }

            <div class="chip-row"><span class="badge neutral">${t.annotator}</span><span class="badge neutral">Submitted: ${t.submittedAt || "Chưa submit"}</span><span class="badge returned">Return count: ${t.returnCount}</span></div>

          ${state.qaTab === "review" ? qaReviewBody(t) : historyBody(t)}
        </section>`;

    function qaReviewBody(t) {
      return `<div class="panel-body">
        <div class="split-diff">
          <div class="diff-col"><h3>LLM Baseline</h3><div class="inner">${dimensions.map(d => `<p><strong>${d}</strong>: ${fmtScore(t.pre[d])}</p>`).join("")}</div></div>
          <div class="diff-col"><h3>Annotator Output</h3><div class="inner">${dimensions.map(d => `<p><strong>${d}</strong>: ${fmtScore(t.ann[d])}</p>`).join("")}<p><strong>Composite</strong>: ${fmtScore(composite(t))}</p></div></div>
          <div class="diff-col"><h3>Delta</h3><div class="inner">${dimensions.map(d => {
            const delta = t.ann[d] - t.pre[d];
            return `<p class="${deltaClass(delta)}"><strong>${d}</strong>: ${delta >= 0 ? "+" : ""}${fmtScore(delta)}</p>`;
          }).join("")}</div></div>
        </div>
        <div class="grid grid-2" style="margin-top:16px;">
          <div class="card padded">
            <h3 class="section-title">Claim text cuối cùng ${t.edited ? "<span class='badge submitted'>Đã sửa claim</span>" : ""}</h3>

          <div class="card padded">

        <div class="quick-actions"><button class="btn primary" id="approveTask">Approve</button><button class="btn danger" id="returnTask">Return</button></div>
      </div>`;

    function historyBody(t) {
      const items = [
        ["Imported", "System tạo work item từ batch BAT-001"],
        ["Claim Extracted", "LLM tách claim text"],
        ["Pre-scoring Running", "Gọi endpoint pre-score"],
        [t.status, `${t.annotator} submit, QA review hiện tại`]
      ];
      return `<div class="timeline">${items.map(([title, text]) => `<div class="timeline-item"><strong>${title}</strong><span class="small muted">${text}</span></div>`).join("")}</div>`;
    }

    function renderExport() {
      const approvedCount = tasks.filter(t => t.status === "Approved").length;
      byId("export").innerHTML = `
        <div class="grid grid-2">
          <section class="card padded">
            <h2 class="section-title">Create Export Job</h2>
            <div class="form-grid" style="margin-top:14px;">
              <div class="field"><label>Project</label><select id="exportProject"><option>${project.name}</option></select></div>
              <div class="field"><label>Batch optional</label><select><option>${project.batch}</option><option>All batches</option></select></div>
              <div class="field"><label>Status</label><select id="exportStatus"><option>Approved</option><option disabled>Returned</option><option disabled>In Annotation</option><option disabled>Submitted</option></select></div>
              <div class="field"><label>Format</label><select><option>CSV claim-level</option><option disabled>JSON - Phase sau</option><option disabled>XLSX - Phase sau</option></select></div>
            </div>
            <div class="banner blue" style="margin-top:14px;">Rule: chỉ export task Approved. Hiện có ${approvedCount} task eligible.</div>
            <div class="quick-actions"><button class="btn primary" id="createExport">Create Export Job</button></div>
          </section>
          ${assumptionPanel()}
        </div>
        <section class="card" style="margin-top:16px;">
          <div class="card-header"><h2>Export History</h2><span class="badge neutral">CSV claim-level</span></div>
          <div class="table-wrap"><table><thead><tr><th>Job</th><th>Project</th><th>Status</th><th>Approved tasks</th><th>Created by</th><th>Time</th><th>Download</th></tr></thead>
          <tbody>${state.exportJobs.map(j => `<tr><td><strong>${j.id}</strong></td><td>${j.project}</td><td><span class="badge approved">${j.status}</span></td><td>${j.count}</td><td>${j.by}</td><td>${j.time}</td><td><button class="btn">Download mock</button></td></tr>`).join("")}</tbody></table></div>
        </section>`;
    }

    function renderUsers() {
      const users = [
        ["Admin Trí", "ADMIN", "Đang hoạt động"],
        ["Annotator Mai", "Annotator", "Đang hoạt động"],
        ["Annotator Nam", "Annotator", "Đang hoạt động"],
        ["QA Linh", "QA", "Đang hoạt động"]
      ];
      byId("users").innerHTML = `<section class="card"><div class="card-header"><h2>User Management</h2><span class="badge neutral">RBAC cơ bản</span></div><div class="table-wrap"><table><thead><tr><th>User</th><th>Role</th><th>Status</th></tr></thead><tbody>${users.map(u => `<tr><td>${u[0]}</td><td>${u[1]}</td><td><span class="badge ready">${u[2]}</span></td></tr>`).join("")}</tbody></table></div></section>`;
    }

    function renderAudit() {
      byId("audit").innerHTML = `<section class="card"><div class="card-header"><h2>Audit Log</h2><span class="badge neutral">Mock tối thiểu</span></div><div class="table-wrap"><table><thead><tr><th>User</th><th>Action</th><th>Entity</th><th>Time</th><th>Detail</th></tr></thead><tbody>${state.audit.map(a => `<tr><td>${a.user}</td><td>${a.action}</td><td>${a.entity}</td><td>${a.time}</td><td>${a.detail}</td></tr>`).join("")}</tbody></table></div></section>`;
    }

    function render() {
      document.querySelectorAll(".view").forEach(el => el.classList.remove("active"));
      if (byId(state.view)) byId(state.view).classList.add("active");
      renderShell();
      if (state.view === "login") renderLogin();
      if (state.view === "changePassword") renderChangePassword();
      if (state.view === "dashboard") renderDashboard();
      if (state.view === "projects") renderProjects();
      if (state.view === "tasks") renderTasks();
      if (state.view === "annotation") renderAnnotation();
      if (state.view === "qa") renderQa();
      if (state.view === "qaReview") renderQaReview();
      if (state.view === "export") renderExport();
      if (state.view === "users") renderUsers();
      if (state.view === "audit") renderAudit();
    }

    function updateScoreInputs() {
      const t = taskById(state.selectedTaskId);
      document.querySelectorAll("[data-score]").forEach(input => {
        const key = input.dataset.score;
        const val = Math.max(0, Math.min(1, Number(input.value || 0)));
        input.value = fmtScore(val);
        t.ann[key] = val;
        const delta = val - t.pre[key];
        const deltaCell = byId(`delta-${key}`);
        if (deltaCell) {
          deltaCell.textContent = `${delta >= 0 ? "+" : ""}${fmtScore(delta)}`;
          deltaCell.className = deltaClass(delta);
        }
      });
      const comp = byId("compositeScore");
      if (comp) {
        comp.textContent = fmtScore(composite(t));
        comp.className = `score-pill ${scoreClass(composite(t))}`;
      }
    }

    function submitAnnotation() {
      const t = taskById(state.selectedTaskId);
      updateScoreInputs();
      t.claimFinal = byId("claimText").value.trim();
      t.edited = t.claimFinal !== t.claimOriginal;
      t.sourceStatus = byId("sourceStatus").value;
      t.sourceNote = byId("sourceNote").value.trim();
      t.reason = byId("reasonText").value.trim();
      t.notes = byId("annotatorNotes").value.trim();
      const missingDimension = dimensions.some(d => t.ann[d] === "" || Number.isNaN(Number(t.ann[d])));
      const highDelta = dimensions.some(d => Math.abs(t.ann[d] - t.pre[d]) > .20);
      if (missingDimension) return toast("Chưa đủ 6 dimension. Vui lòng điền toàn bộ scoring.");
      if (!t.sourceStatus) return toast("Chưa chọn source status.");
      if (t.sourceStatus === "Không truy cập được" && !t.sourceNote) return toast("Nguồn không truy cập được nên bắt buộc nhập source note.");
      if (highDelta && !t.reason) return toast("Có score lệch quá ±0.20 nên bắt buộc nhập lý do thay đổi.");
      t.status = "Submitted";
      t.submittedAt = "04/06/2026 10:15";
      state.qaTaskId = t.id;
      addAudit("Submit Annotation", t.id, "Task chuyển sang Submitted và vào QA Queue");
      toast("Annotation đã submit, task đã vào QA Queue.");
      setView("qa");
    }

    function approveTask() {
      const t = taskById(state.qaTaskId);
      t.status = "Approved";
      addAudit("Approve Task", t.id, "Task chuyển sang Approved, eligible for export");
      toast("Task đã Approved và đủ điều kiện export.");
      render();
    }

    function openReturnModal() {
      byId("returnType").value = "";
      byId("returnComment").value = "";
      byId("returnModal").classList.add("active");
    }

    function closeReturnModal() {
      byId("returnModal").classList.remove("active");
    }

    function confirmReturn() {
      const type = byId("returnType").value;
      const comment = byId("returnComment").value.trim();
      if (!type) return toast("Vui lòng chọn error type.");
      if (!comment) return toast("Vui lòng nhập comment trước khi Return.");
      const t = taskById(state.qaTaskId);
      t.status = "Returned";
      t.returnCount += 1;
      t.qaComment = `${type}: ${comment}`;
      state.selectedTaskId = t.id;
      addAudit("Return Task", t.id, "QA return task cho annotator");
      closeReturnModal();
      toast("Task đã Returned về annotator.");
      render();
    }

    function createExportJob() {
      const count = tasks.filter(t => t.status === "Approved").length;
      if (!count) return toast("Không có task Approved để export.");
      const id = `EXP-2026-${String(state.exportJobs.length + 1).padStart(3, "0")}`;
      state.exportJobs.unshift({ id, project: project.name, status: "Done", count, by: state.role === "QA" ? "QA Linh" : "Admin Trí", time: "04/06/2026 10:15" });
      addAudit("Create Export Job", id, `Export CSV claim-level cho ${count} Approved task`);
      toast("Export job đã tạo. Download mock đã sẵn sàng.");
      render();
    }

    function submitLogin() {
      const email = byId("loginEmail").value.trim();
      const password = byId("loginPassword").value.trim();
      if (!email || !email.includes("@")) return toast("Email đăng nhập chưa hợp lệ.");
      if (!password) return toast("Vui lòng nhập mật khẩu.");
      addAudit("Login", state.role, `Login mock bằng ${email}`);
      toast("Login mock thành công. Đang mở Dashboard.");
      setView("dashboard");
    }

    function submitPasswordChange() {
      const current = byId("currentPassword").value;
      const next = byId("newPassword").value;
      const confirm = byId("confirmPassword").value;
      if (!current) return toast("Vui lòng nhập mật khẩu hiện tại.");
      if (next.length < 8) return toast("Mật khẩu mới cần tối thiểu 8 ký tự.");
      if (next === current) return toast("Mật khẩu mới phải khác mật khẩu hiện tại.");
      if (next !== confirm) return toast("Xác nhận mật khẩu mới chưa khớp.");
      addAudit("Change Password", state.role, "User đổi mật khẩu mock thành công");
      toast("Mật khẩu đã được cập nhật trong prototype.");
      setView("dashboard");
    }

    document.addEventListener("click", event => {
      const accountMenu = byId("userMenu");
      const accountButton = byId("userMenuButton");
      const accountAction = event.target.closest("[data-account-action]");
      if (accountAction) {
        accountMenu.classList.remove("open");
        accountButton.setAttribute("aria-expanded", "false");
        if (accountAction.dataset.accountAction === "change-password") setView("changePassword");
        if (accountAction.dataset.accountAction === "logout") {
          addAudit("Logout", state.role, "User đăng xuất khỏi prototype");
          window.location.href = "login.html";
        }
        return;
      }
      if (event.target.closest("#userMenuButton")) {
        const expanded = accountButton.getAttribute("aria-expanded") === "true";
        accountMenu.classList.toggle("open", !expanded);
        accountButton.setAttribute("aria-expanded", String(!expanded));
        return;
      }
      if (!event.target.closest(".account-menu")) {
        accountMenu.classList.remove("open");
        accountButton.setAttribute("aria-expanded", "false");
      }
      const navItem = event.target.closest("[data-view]");
      if (navItem) setView(navItem.dataset.view);
      const go = event.target.closest("[data-go]");
      if (go) setView(go.dataset.go);
      const step = event.target.closest("[data-step]");
      if (step) { state.projectMode = "wizard"; state.wizardStep = Number(step.dataset.step); render(); }
      if (event.target.matches("[data-project-list]")) { state.projectMode = "list"; render(); }
      if (event.target.matches("[data-new-project]")) { state.projectMode = "wizard"; state.wizardStep = 1; render(); }
      if (event.target.matches("[data-project-detail]")) { state.projectMode = "wizard"; state.wizardStep = 5; render(); }
      if (event.target.matches("[data-project-import]")) { state.projectMode = "wizard"; state.wizardStep = 3; render(); }
      if (event.target.matches("[data-next-step]")) { state.wizardStep = Math.min(5, state.wizardStep + 1); render(); }
      if (event.target.matches("[data-prev-step]")) { state.wizardStep = Math.max(1, state.wizardStep - 1); render(); }
      if (event.target.id === "validateDataset") { state.datasetValidated = true; addAudit("Validate PDF Bundle", project.batch, "PDF bundle hợp lệ với cảnh báo source_url missing"); toast("PDF bundle đã validate thành công."); render(); }
      const openAnn = event.target.closest("[data-open-annotation]");
      if (openAnn) { state.selectedTaskId = openAnn.dataset.openAnnotation; taskById(state.selectedTaskId).status = taskById(state.selectedTaskId).status === "Ready for Annotation" ? "In Annotation" : taskById(state.selectedTaskId).status; setView("annotation"); }
      const openQa = event.target.closest("[data-open-qa]");
      if (openQa) { state.qaTaskId = openQa.dataset.openQa; setView("qaReview"); }
      const refTab = event.target.closest("[data-ref-tab]");
      if (refTab) { state.activeReferenceTab = refTab.dataset.refTab; render(); }
      const qaTab = event.target.closest("[data-qa-tab]");
      if (qaTab) { state.qaTab = qaTab.dataset.qaTab; render(); }
      if (event.target.id === "submitAnnotation") submitAnnotation();
      if (event.target.id === "approveTask") approveTask();
      if (event.target.id === "returnTask") openReturnModal();
      if (event.target.id === "closeReturnModal" || event.target.id === "cancelReturn") closeReturnModal();
      if (event.target.id === "confirmReturn") confirmReturn();
      if (event.target.id === "createExport") createExportJob();
      if (event.target.id === "submitLogin") submitLogin();
      if (event.target.id === "submitPasswordChange") submitPasswordChange();
      if (event.target.id === "editClaim") toast("Claim text đang ở chế độ chỉnh sửa trong textarea.");
    });

    document.addEventListener("change", event => {
      if (event.target.matches("[data-score]")) updateScoreInputs();
    });

    document.addEventListener("input", event => {
      if (event.target.matches("[data-score]")) updateScoreInputs();
    });

    byId("closeReturnModal").addEventListener("click", closeReturnModal);
    byId("cancelReturn").addEventListener("click", closeReturnModal);
    byId("confirmReturn").addEventListener("click", confirmReturn);

    render();
  </script>
</body>
</html>
