name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Hủy run cũ khi có push mới trên cùng branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # BACKEND — ruff lint + pytest
  # ──────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            src/backend/pyproject.toml
            src/backend/uv.lock

      - name: Install Python 3.12 + dependencies
        run: uv sync --python 3.12 --all-groups

      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Lint — ruff format
        run: uv run ruff format --check .

      - name: Test — pytest
        run: uv run pytest --tb=short
        env:
          APP_ENV: development
          JWT_SECRET: ci-test-secret
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          DATABASE_URL_SYNC: sqlite:///./test.db

  # ──────────────────────────────────────────────
  # FRONTEND — ESLint + TypeScript + Vitest
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe_ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20.19
        uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: npm
          cache-dependency-path: fe_ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint — ESLint
        run: npm run lint

      - name: Type-check + Build
        run: npm run build

  # ──────────────────────────────────────────────
  # E2E — Docker Compose stack + Playwright reports
  # ──────────────────────────────────────────────
  e2e:
    name: E2E — Playwright Integration
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: fe_ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20.19
        uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: npm
          cache-dependency-path: fe_ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Create CI env file from GitHub secrets
        working-directory: .
        env:
          APP_ENV: development
          APP_DEBUG: false
          API_HOST: 0.0.0.0
          API_PORT: 8000
          CORS_ORIGINS: http://localhost:5173
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ALGORITHM: HS256
          JWT_ACCESS_TTL_MINUTES: 30
          JWT_REFRESH_TTL_DAYS: 7
          AUTH_MOCK_ENABLED: false
          SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY }}
          REDIS_URL: redis://redis:6379/0
          STORAGE_BACKEND: s3
          S3_ENDPOINT_URL: http://minio:9000
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          LOG_LEVEL: INFO
          LOG_FORMAT: console
        run: |
          cat > .env <<EOF
          APP_ENV=$APP_ENV
          APP_DEBUG=$APP_DEBUG
          API_HOST=$API_HOST
          API_PORT=$API_PORT
          CORS_ORIGINS=$CORS_ORIGINS
          JWT_SECRET=$JWT_SECRET
          JWT_ALGORITHM=$JWT_ALGORITHM
          JWT_ACCESS_TTL_MINUTES=$JWT_ACCESS_TTL_MINUTES
          JWT_REFRESH_TTL_DAYS=$JWT_REFRESH_TTL_DAYS
          AUTH_MOCK_ENABLED=$AUTH_MOCK_ENABLED
          SECRET_ENCRYPTION_KEY=$SECRET_ENCRYPTION_KEY
          REDIS_URL=$REDIS_URL
          STORAGE_BACKEND=$STORAGE_BACKEND
          S3_ENDPOINT_URL=$S3_ENDPOINT_URL
          S3_ACCESS_KEY=$S3_ACCESS_KEY
          S3_SECRET_KEY=$S3_SECRET_KEY
          S3_BUCKET=$S3_BUCKET
          S3_REGION=$S3_REGION
          LOG_LEVEL=$LOG_LEVEL
          LOG_FORMAT=$LOG_FORMAT
          EOF

      - name: Start app stack
        working-directory: .
        run: docker compose up -d --build postgres redis minio minio-init api web

      - name: Run migrations
        working-directory: .
        run: docker compose exec -T api alembic upgrade head

      - name: Seed E2E users
        working-directory: .
        run: docker compose exec -T api python /scripts/seed_dev.py

      - name: Run Playwright E2E with reports
        env:
          E2E_BASE_URL: http://localhost:5173
        run: node ../test/e2e/run-e2e-report.mjs

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-artifacts
          path: test/e2e/.artifacts
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop app stack
        if: always()
        working-directory: .
        run: docker compose down -v

  # ──────────────────────────────────────────────
  # CD readiness — build deployable images, no push
  # ──────────────────────────────────────────────
  docker-build:
    name: CD Readiness — Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build deployable images
        run: docker compose build api worker web
