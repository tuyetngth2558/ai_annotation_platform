name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Hủy run cũ khi có push mới trên cùng branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # BACKEND — ruff lint + pytest
  # ──────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: src/backend/pyproject.toml

      - name: Install Python 3.12 + dependencies
        run: uv sync --python 3.12 --all-groups

      - name: Lint — ruff check
        run: uv run ruff check .

      - name: Lint — ruff format
        run: uv run ruff format --check .

      - name: Test — pytest
        run: uv run pytest --tb=short
        env:
          APP_ENV: development
          JWT_SECRET: ci-test-secret
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          DATABASE_URL_SYNC: sqlite:///./test.db

  # ──────────────────────────────────────────────
  # FRONTEND — ESLint + TypeScript + Vitest
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint — ESLint
        run: npm run lint

      - name: Type-check + Build
        run: npm run build

      - name: Test — Vitest
        run: npm test
