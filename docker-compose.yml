# ==============================================================================
# VSF AI Annotation Platform — Dev stack
# Chạy: docker compose up   (hoặc: make up  /  .\scripts\dev.ps1 up)
# Gồm: postgres + redis + minio + api (FastAPI) + worker (ARQ) + web (Vite)
# ==============================================================================
name: vsf-annotation

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vsf
      POSTGRES_PASSWORD: vsf
      POSTGRES_DB: vsf_annotation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsf -d vsf_annotation"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Tạo bucket mặc định sau khi MinIO sẵn sàng, rồi thoát.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/vsf-pdf &&
      echo 'MinIO bucket vsf-pdf ready';
      "

  api:
    build:
      context: ./src/backend
      dockerfile: ../../infra/docker/api.Dockerfile
    env_file: .env
    environment:
      # Override host trong mạng docker (services gọi nhau bằng tên service)
      DATABASE_URL: postgresql+asyncpg://vsf:vsf@postgres:5432/vsf_annotation
      DATABASE_URL_SYNC: postgresql+psycopg://vsf:vsf@postgres:5432/vsf_annotation
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      # AUTH_MOCK_ENABLED lấy từ .env (mặc định false → login thật bằng DB).
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/app           # hot-reload code khi dev
      - ./scripts:/scripts:ro        # seed_dev.py và script dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./src/backend
      dockerfile: ../../infra/docker/worker.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vsf:vsf@postgres:5432/vsf_annotation
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      # AUTH_MOCK_ENABLED lấy từ .env (mặc định false → login thật bằng DB).
    volumes:
      - ./src/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.jobs.worker.WorkerSettings

  web:
    build:
      context: ./src/frontend/web
      dockerfile: ../../../infra/docker/web.Dockerfile
    environment:
      # FE gọi API qua localhost của host (browser chạy ngoài docker)
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend/web:/app
      - /app/node_modules            # giữ node_modules trong container
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  miniodata:
